<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="isoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#030810;stop-opacity:1"/>
    </linearGradient>
    <filter id="tealGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softTeal">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="520" fill="url(#isoBg)"/>

  <!-- Grid floor -->
  <g opacity="0.12" stroke="#00e5cc" stroke-width="0.5">
    <line x1="450" y1="340" x2="150" y2="490"/><line x1="450" y1="340" x2="750" y2="490"/>
    <line x1="300" y1="415" x2="600" y2="415"/><line x1="350" y1="445" x2="650" y2="445"/>
    <line x1="390" y1="468" x2="690" y2="468"/>
    <line x1="300" y1="415" x2="300" y2="490"/><line x1="350" y1="387" x2="350" y2="490"/>
    <line x1="400" y1="360" x2="400" y2="490"/><line x1="450" y1="340" x2="450" y2="490"/>
    <line x1="500" y1="360" x2="500" y2="490"/><line x1="550" y1="387" x2="550" y2="490"/>
    <line x1="600" y1="415" x2="600" y2="490"/>
  </g>

  <!-- LAYER 1: Hardware (bottom) -->
  <!-- TDX Block -->
  <g transform="translate(130, 300)">
    <!-- top face -->
    <polygon points="80,0 160,40 160,80 80,40" fill="#0a2a2a" stroke="#00e5cc" stroke-width="1.5"/>
    <!-- right face -->
    <polygon points="160,40 160,80 160,120 160,80" fill="#041818" stroke="#00e5cc" stroke-width="0.5"/>
    <!-- left face -->
    <polygon points="80,0 80,40 80,80 80,40" fill="#061f1f" stroke="#00e5cc" stroke-width="0.5"/>
    <!-- top face proper -->
    <polygon points="0,40 80,0 160,40 80,80" fill="#0d3535" stroke="#00e5cc" stroke-width="1.5"/>
    <text x="80" y="42" font-family="'Courier New', monospace" font-size="9" fill="#00e5cc" text-anchor="middle" filter="url(#softTeal)">Intel TDX</text>
    <!-- RTMR slots -->
    <rect x="20" y="55" width="18" height="6" rx="1" fill="#00e5cc" opacity="0.6"/>
    <rect x="44" y="55" width="18" height="6" rx="1" fill="#00e5cc" opacity="0.6"/>
    <rect x="68" y="55" width="18" height="6" rx="1" fill="#00e5cc" opacity="0.5"/>
    <rect x="92" y="55" width="18" height="6" rx="1" fill="#00e5cc" opacity="0.4"/>
    <text x="20" y="70" font-family="'Courier New', monospace" font-size="6" fill="#00e5cc80">RTMR[0]</text>
    <text x="44" y="70" font-family="'Courier New', monospace" font-size="6" fill="#00e5cc80">RTMR[1]</text>
    <text x="68" y="70" font-family="'Courier New', monospace" font-size="6" fill="#00e5cc80">RTMR[2]</text>
    <text x="92" y="70" font-family="'Courier New', monospace" font-size="6" fill="#00e5cc80">RTMR[3]</text>
  </g>

  <!-- SEV-SNP Block -->
  <g transform="translate(580, 300)">
    <polygon points="0,40 80,0 160,40 80,80" fill="#0d2a1a" stroke="#00cc88" stroke-width="1.5"/>
    <polygon points="0,40 0,80 80,120 80,80" fill="#061a10" stroke="#00cc88" stroke-width="0.8"/>
    <polygon points="160,40 160,80 80,120 80,80" fill="#081f12" stroke="#00cc88" stroke-width="0.8"/>
    <text x="80" y="42" font-family="'Courier New', monospace" font-size="9" fill="#00cc88" text-anchor="middle">AMD SEV-SNP</text>
    <text x="80" y="58" font-family="'Courier New', monospace" font-size="7" fill="#00cc8880" text-anchor="middle">VCEK Chain</text>
    <text x="80" y="70" font-family="'Courier New', monospace" font-size="6" fill="#00cc8860" text-anchor="middle">ARK → ASK → VCEK</text>
  </g>

  <!-- Hardware attestation bus connecting TDX and SEV -->
  <line x1="290" y1="360" x2="580" y2="360" stroke="#00e5cc" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
  <text x="435" y="354" font-family="'Courier New', monospace" font-size="8" fill="#00e5cc50" text-anchor="middle">attestation bus</text>

  <!-- LAYER 2: Enclave (center) — vault cube -->
  <g transform="translate(330, 160)">
    <!-- left wall -->
    <polygon points="0,80 120,20 120,120 0,180" fill="#091828" stroke="#00e5cc" stroke-width="1.5"/>
    <!-- right wall -->
    <polygon points="120,20 240,80 240,180 120,120" fill="#061220" stroke="#00b8a9" stroke-width="1.5"/>
    <!-- top face -->
    <polygon points="0,80 120,20 240,80 120,140" fill="#0f2840" stroke="#00e5cc" stroke-width="2" filter="url(#softTeal)"/>

    <!-- Inner glow -->
    <ellipse cx="120" cy="80" rx="60" ry="30" fill="#00e5cc" opacity="0.04"/>

    <!-- Key icon center -->
    <circle cx="120" cy="75" r="16" fill="none" stroke="#00e5cc" stroke-width="1.5" filter="url(#softTeal)"/>
    <circle cx="120" cy="75" r="8" fill="#00e5cc" opacity="0.3"/>
    <text x="120" y="80" font-family="'Courier New', monospace" font-size="14" fill="#00e5cc" text-anchor="middle" filter="url(#tealGlow)">⚿</text>

    <!-- Boundary label -->
    <text x="120" y="110" font-family="'Courier New', monospace" font-size="8" fill="#00e5cc" text-anchor="middle">secp256k1 keypair</text>
    <text x="120" y="122" font-family="'Courier New', monospace" font-size="7" fill="#00e5cc60" text-anchor="middle">never exits boundary</text>

    <!-- Left wall labels -->
    <text x="40" y="110" font-family="'Courier New', monospace" font-size="8" fill="#ffffff50" transform="skewY(-20)">Policy Gate</text>
    <!-- Right wall labels -->
    <text x="155" y="130" font-family="'Courier New', monospace" font-size="8" fill="#ffffff40" transform="skewY(14)">Audit Log</text>

    <!-- Enclave boundary label on top -->
    <text x="120" y="30" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#00e5cc" text-anchor="middle" filter="url(#softTeal)">TRUSTED EXECUTION BOUNDARY</text>
  </g>

  <!-- Trade Signal arrow INTO enclave -->
  <line x1="160" y1="250" x2="330" y2="240" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <text x="215" y="238" font-family="'Courier New', monospace" font-size="9" fill="#f59e0b">Trade Signal</text>
  <!-- Policy gate marker -->
  <rect x="285" y="230" width="45" height="20" rx="3" fill="#1a1000" stroke="#f59e0b" stroke-width="1"/>
  <text x="308" y="244" font-family="'Courier New', monospace" font-size="7" fill="#f59e0b" text-anchor="middle">POLICY</text>

  <!-- Attestation chain UP from hardware to enclave -->
  <line x1="290" y1="300" x2="380" y2="260" stroke="#00e5cc" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="315" y="288" font-family="'Courier New', monospace" font-size="7" fill="#00e5cc70" transform="rotate(-25, 315, 288)">RTMR measurement</text>

  <!-- LAYER 3: Network (top right) -->
  <!-- Jupiter RPC node -->
  <rect x="690" y="130" width="130" height="50" rx="6" fill="#080f1a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="755" y="150" font-family="'Courier New', monospace" font-size="10" fill="#60a5fa" text-anchor="middle">Jupiter v6</text>
  <text x="755" y="165" font-family="'Courier New', monospace" font-size="8" fill="#60a5fa60" text-anchor="middle">RPC / Quote API</text>

  <!-- Solana Validator node -->
  <rect x="690" y="210" width="130" height="50" rx="6" fill="#080f1a" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="755" y="230" font-family="'Courier New', monospace" font-size="10" fill="#a78bfa" text-anchor="middle">Solana Validator</text>
  <text x="755" y="245" font-family="'Courier New', monospace" font-size="8" fill="#a78bfa60" text-anchor="middle">Jito Block Engine</text>

  <!-- RA-TLS connection from enclave to Jupiter -->
  <line x1="570" y1="200" x2="690" y2="165" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="620" y="178" font-family="'Courier New', monospace" font-size="7" fill="#60a5fa80">RA-TLS</text>
  <rect x="618" y="165" width="24" height="12" rx="2" fill="#060d1a" stroke="#3b82f640" stroke-width="1"/>
  <text x="630" y="175" font-family="'Courier New', monospace" font-size="7" fill="#60a5fa" text-anchor="middle">🔒</text>

  <!-- Signed tx outbound -->
  <line x1="570" y1="240" x2="690" y2="235" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="620" y="232" font-family="'Courier New', monospace" font-size="7" fill="#a78bfa80">Signed TX</text>

  <!-- Attestation chain DOWN from enclave to hardware -->
  <line x1="450" y1="310" x2="450" y2="340" stroke="#00e5cc" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Header -->
  <text x="30" y="38" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#00e5cc" filter="url(#tealGlow)">AEGIS</text>
  <text x="108" y="38" font-family="'Courier New', monospace" font-size="11" fill="#ffffff30">/ TEE execution architecture</text>
  <line x1="30" y1="50" x2="870" y2="50" stroke="#00e5cc" stroke-width="0.5" opacity="0.2"/>

  <!-- Layer labels -->
  <text x="30" y="200" font-family="'Courier New', monospace" font-size="9" fill="#ffffff20" transform="rotate(-90, 30, 200)">NETWORK LAYER</text>
  <text x="30" y="310" font-family="'Courier New', monospace" font-size="9" fill="#ffffff20" transform="rotate(-90, 30, 310)">ENCLAVE LAYER</text>
  <text x="30" y="420" font-family="'Courier New', monospace" font-size="9" fill="#ffffff20" transform="rotate(-90, 30, 420)">HARDWARE LAYER</text>

  <!-- Footer -->
  <text x="450" y="505" font-family="'Courier New', monospace" font-size="8" fill="#ffffff12" text-anchor="middle">AEGIS  •  TRUSTED EXECUTION ENVIRONMENT  •  INTEL TDX + AMD SEV-SNP  •  CLAUDE AGENT SDK</text>
</svg>
