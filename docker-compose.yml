version: "3.9"

services:
  enclave-trade:
    build: .
    container_name: enclave-trade
    restart: unless-stopped
    env_file: .env
    environment:
      - CHROMA_URL=http://chroma:8000
    depends_on:
      chroma:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - enclave-data:/app/data
    networks:
      - enclave-net
    # TEE device passthrough (uncomment for hardware TDX)
    # devices:
    #   - /dev/tdx_guest:/dev/tdx_guest

  chroma:
    image: chromadb/chroma:latest
    container_name: enclave-chroma
    restart: unless-stopped
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8000:8000"
    networks:
      - enclave-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  chroma-data:
    driver: local
  enclave-data:
    driver: local

networks:
  enclave-net:
    driver: bridge

